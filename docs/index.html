<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>불완전거래 해소를 위한 내 편인 AI — 우리은행</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif; background: #0a0f1e; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
    .badge { background: rgba(27,100,218,0.2); border: 1px solid rgba(27,100,218,0.5); color: #6fa3f7; font-size: 13px; font-weight: 600; padding: 6px 14px; border-radius: 20px; margin-bottom: 24px; }
    h1 { font-size: 28px; font-weight: 800; text-align: center; line-height: 1.4; margin-bottom: 10px; }
    .sub { font-size: 15px; color: #888; text-align: center; margin-bottom: 48px; }
    .cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
    .card { background: #141929; border: 1px solid #1e2740; border-radius: 20px; padding: 32px 28px; width: 280px; display: flex; flex-direction: column; gap: 12px; }
    .card-label { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; }
    .card-label.before { color: #888; }
    .card-label.after { color: #1b64da; }
    .card h2 { font-size: 18px; font-weight: 800; }
    .card p { font-size: 13px; color: #666; line-height: 1.6; }
    .btn { display: block; text-align: center; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 700; text-decoration: none; margin-top: 8px; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.85; }
    .btn-before { background: #1e2740; color: #aaa; }
    .btn-after { background: #1b64da; color: #fff; }
    .footer { margin-top: 48px; font-size: 12px; color: #444; }
  </style>
</head>
<body>
  <div class="badge">우리은행 해커톤 2026</div>
  <h1>불완전거래 해소를 위한<br />'내 편인 AI'</h1>
  <p class="sub">챗봇이 아닌, 옆에 앉은 행원처럼</p>
  <div class="cards">
    <div class="card">
      <span class="card-label before">BEFORE</span>
      <h2>기존 앱</h2>
      <p>AI 안내 없이 고객이 스스로 읽고 판단해야 하는 기존 펀드 가입 플로우</p>
      <a href="./before/" class="btn btn-before">데모 보기 →</a>
    </div>
    <div class="card">
      <span class="card-label after">AFTER</span>
      <h2>내 편인 AI</h2>
      <p>음성 안내 · AI 펀드 설명 · 단어별 하이라이트로 불완전 거래를 원천 차단</p>
      <a href="./after/" class="btn btn-after">데모 보기 →</a>
    </div>
  </div>
  <p class="footer">© 2026 Team HanMadi · Woori Bank Hackathon</p>
</body>
</html>
